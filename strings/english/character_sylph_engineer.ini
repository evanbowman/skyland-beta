
[rooms]
power-core = "Human make. Crude by our standards. <B:0> ...And yet it holds, day after day. <B:0> Mine did not. There is a lesson in that, if I am willing to hear it."
reactor = "Now this I respect. Real output, and no crystal to betray you when the air turns. <B:0> Cruder than our work, yes. But it does not fail quietly in the night."
chaos-core = "Goblin work. I should find it beneath me. <B:0> ...But it runs, and mine cracked in my hands. <B:0> I have grown less proud than I was."
war-engine = "Ah — old-world engineering, this. <B:0> Whoever built it understood tolerances we have forgotten. <B:0> We knew how, once. Before the veins ran dry."
stairwell = "A stairwell. Efficient enough. <B:0> I would have run the passage two blocks left — but it is not mine to redesign. Not yet."
ladder = "A ladder. <B:0> Nothing to maintain, nothing to fail. <B:0> There is an honesty in simple things I have come to appreciate."
infirmary = "Clean, well-ordered. Whoever tends this takes pride in it. <B:0> Good. A system is only as sound as the hand that keeps it."
decimator = "A brutal instrument. <B:0> I will not pretend to admire it. <B:0> Still — I will keep it in working order. That much is my trade."
workshop = "A functioning workshop. <B:0> ...You cannot know how long I searched for one of these. <B:0> Give me a bench and a full toolrack and I am content. Truly."
manufactory = "Fine work. The tolerances hold across every cycle. <B:0> Whoever raised this knew their craft. <B:0> I would be glad to learn this island's methods."
bridge = "A steady vantage. <B:0> From here one can watch the whole island breathe — every system, every draw of power. <B:0> I find it calming, if I am honest."
transporter = "Sound mechanism, this. <B:0> Matter displacement is delicate work — one misaligned field and... well. <B:0> This one is tuned properly. Someone was careful."
replicator = "Hm. It copies the living pattern — but imperfectly. Each iteration fainter, and no mending it after. <B:0> A crude echo of our own crystal-grafting, and I never trusted that either. <B:0> Some systems should not be run merely because they can be."

