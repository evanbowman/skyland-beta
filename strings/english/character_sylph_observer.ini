
[rooms]
power-core = "A human atomic core. I have catalogued a dozen such configurations; this is among the more efficient. <B:0> The archive should hold a record of it. I will see to that."
reactor = "Considerable output, and considerable hazard. <B:0> I have documented the failure modes at length. <B:0> Knowing how a thing breaks is its own kind of understanding."
chaos-core = "Goblin engineering. Cruder than my models predicted — and yet it functions. <B:0> There is a lesson in the improvisation. My people would do well to note it."
war-engine = "Pre-Change construction. Our archives hold only fragments of such designs. <B:0> To observe one intact is rare fortune. <B:0> I will record every detail I am able."
stairwell = "A stairwell. Unremarkable. <B:0> Yet the whole is understood through its parts, and so even this merits a line in the record."
ladder = "A ladder. <B:0> I note it, and move on. Not every observation yields insight — I have learned that much, at least."
infirmary = "Here the wounded are mended. <B:0> I have studied human resilience at length... from a distance. <B:0> Perhaps that was always my error. Too much from a distance."
decimator = "A weapon of significant yield. I record its specifications; I decline to admire them. <B:0> Knowledge is neutral. Its use is not."
workshop = "This is precisely what my people sent me to study — how humans raise so much from so little. <B:0> I am still learning. I suspect I always shall be."
manufactory = "Efficient throughput. I have noted the cycle times. <B:0> The Conclave would find this instructive... <B:0> were they inclined to listen. They were not, when it mattered."
bridge = "From this vantage the patterns resolve. <B:0> This is where I do my finest work — watching, recording, understanding. <B:0> It is, in the end, what I am for."
transporter = "Matter displacement. I have documented the theory thoroughly, and trusted the practice never. <B:0> Too many variables one cannot observe mid-flight."
replicator = "It reproduces the living pattern, degraded with each iteration, and no restoring it after. <B:0> I could fill a monograph on the failure modes. <B:0> ...And there is the whole of my people's error. We document the diminishment. We do not prevent it."

