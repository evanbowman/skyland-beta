
[rooms]
power-core = "The sssky-folk hang their lives on one frail core. <B:0> They never learned what the sssurface teaches — that what cannot endure alone dessserves its fall."
reactor = "Caged fire, humming behind the wall. <B:0> Power without trial, without the poison to temper it. <B:0> The old world would have found it... unworthy."
chaos-core = "Our people forged this. <B:0> Crude, the sssoft ones sssay — yet it burnsss. <B:0> We were not given ssstrength. We tore it from the sssurface with our handsss."
war-engine = "_lowers voice_ From before the Great Change. <B:0> It remembersss the world that made usss what we are. <B:0> Ssstand a moment in sssilence — few living things are ssso old."
stairwell = "Sssteps. <B:0> The ssspine climbs, the body toughensss. <B:0> Even the sssmall trial hardensss the one who bearsss it."
ladder = "A ladder. <B:0> The weak ride, the ssstrong climb. <B:0> Ssso it hasss always been."
infirmary = "_regards the cots_ Here the wounded are coddled and mended. <B:0> On the sssurface, the wound isss the teacher. <B:0> What lives, lives ssstronger. What doesss not... wasss never meant to."
decimator = "A worthy engine of ruin. <B:0> It doesss not boassst, it doesss not plead. <B:0> It ends what ssstands before it. <B:0> There isss honesty in that."
workshop = "Here they ssshape sssteel to their will. <B:0> A good discipline. <B:0> The ancestorsss ssshaped fleshss the sssame way — ssslower, and in fire."
manufactory = "The room laborsss without ressst, asking nothing. <B:0> If only the crew were ssso tireless. <B:0> Endurance isss the only virtue the sssurface honorsss."
bridge = "From here the ssstorm-line ssshows dark on the horizon. <B:0> It comesss for all of usss in time. <B:0> I do not fear it. <B:0> _quietly_ I wasss forged in itsss kind."
transporter = "It flingsss the body through the air on faith aloneee. <B:0> A sssmall dying, a sssmall rebirth. <B:0> The Change asksss far more, and grantsss no return."
replicator = "_stares long_ It makesss a copy. Weaker. Never whole, never mended. <B:0> The sssurface ssspends nothing it doesss not temper. <B:0> Thisss ssspends, and tempersss nothing. <B:0> _turns away_ There isss no honor in it."

