
[rooms]
power-core = "Everything up here rides on this core. Saw an island fall once, when its own gave out. You don't forget the sound."
reactor = "More power than a core, and twice the target. Guard it like it matters. It does."
chaos-core = "Goblin work. Fought their kind long enough to know — they build things that turn on the hand that holds them."
war-engine = "Made for a war older than any of us. Weapons like this outlast the ones who built them. They always do."
stairwell = "Stairs. In a fight you learn to hold the narrow places. Funny what sticks with you."
ladder = "A ladder. Nothing to it. Not everything has to be a battle."
infirmary = "Been carried into one of these more than once. Walked back out, so far."
decimator = "Ends a fight fast, this. I've seen what it leaves behind. Best it stays pointed outward."
workshop = "Where you rebuild once the damage is done. There's always more damage."
manufactory = "Turns raw stock into whatever the fight needs. War makes everything efficient, given time."
bridge = "Good vantage from up here. First thing you learn: see the trouble before it sees you."
transporter = "Jumped into one of these to get where I am now. Not how I'd choose to travel, but it beat staying put."
replicator = "Makes a copy. Weaker, and it can't be mended. Some things don't come back once they're spent."

[adv-log]
