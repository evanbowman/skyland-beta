
[rooms]
power-core = "This core's the only thing keeping us out of the clouds. Everything else up here, us included, is optional."
reactor = "A reactor. Big output, bigger crater. Whoever built it wanted power more than a good night's sleep."
chaos-core = "Goblin core. Cheap power, and it only sometimes takes the island with it. Bargain."
war-engine = "Surface-era war-engine. Worth more than everything else here stacked together. Pity you can't spend it."
stairwell = "Stairs. Cheapest way up ever devised. Someone still found a way to charge for it, I'd bet."
ladder = "A ladder. Even I can't find the scam in a ladder."
infirmary = "Bandages and a cot. We call that medicine up here."
decimator = "Now this'll pay for itself. Nothing settles accounts like a decimator."
workshop = "A workshop. Where coin turns into walls. Slow, and never cheap."
manufactory = "Manufactory. Costs a fortune to raise, shaves a little off everything after. That's the pitch, anyway."
bridge = "Best view on the island, and free for once. Enjoy it before something shoots at it."
transporter = "This transporter. Fling yourself into an enemy castle and pray the coordinates hold. What could go wrong."
replicator = "Pay the fee, get a copy. Weaker, never heals. Cheapest crew you'll ever hire, and you get exactly what you pay for."

