
[rooms]
power-core = "Strange, that this little core is all that keeps us up here among the clouds. I never quite get used to it..."
reactor = "All that light and heat, shut in one room. Like a captured star, humming to itself."
chaos-core = "Goblin-made, this one. No grace to it — just noise and hunger. I try not to look too long."
war-engine = "Older than the sky-cities, this. I wonder what skies it crossed, before it ever knew ours..."
stairwell = ""
ladder = "A ladder. My mind's already somewhere past the horizon, if I'm honest."
infirmary = ""
decimator = "An ugly thing. I'd sooner chart a hundred islands than fire it once."
workshop = ""
manufactory = ""
bridge = "The whole sky opens out from up here. Somewhere past that haze there's an island no one's named yet. I can feel it..."
transporter = "Close your eyes, and you're somewhere else entirely. The wonder of it never quite fades... even the lurch."
replicator = "A copy, dimmer than the first. Something sad in that — an echo that fades a little more each time it's called."

